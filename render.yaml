# Render Blueprint for the GEO Analyzer backend (FastAPI).
# Deploy: Render Dashboard → New → Blueprint → pick this repo.
# Frontend (Next.js) deploys separately on Vercel (see DEPLOY.md).
services:
  - type: web
    name: geo-analyzer-backend
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      # Keep mock mode on until real keys are set (no 3rd-party billing).
      - key: GEO_TEST_MODE
        value: "true"
      - key: DATABASE_URL
        value: sqlite:///./geo.db
      # Set to the deployed frontend origin, e.g. https://<app>.vercel.app
      - key: CORS_ORIGINS
        sync: false
      # Secrets — set in the Render dashboard, not committed.
      - key: OPENAI_API_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
